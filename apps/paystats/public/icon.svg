<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Bar chart: 3 growing bars -->
  <rect x="108" y="300" width="72" height="112" rx="12" fill="white" opacity="0.5"/>
  <rect x="220" y="220" width="72" height="192" rx="12" fill="white" opacity="0.75"/>
  <rect x="332" y="140" width="72" height="272" rx="12" fill="white" opacity="1"/>
  <!-- € symbol top-left -->
  <text x="124" y="192" font-family="Georgia, serif" font-size="108" font-weight="bold" fill="white" opacity="0.95">€</text>
</svg>
